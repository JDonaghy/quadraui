name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  tui:
    name: tui (build, test, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build (tui feature)
        run: cargo build --features tui --workspace --exclude kubeui-gtk
      - name: Test (tui feature)
        run: cargo test --features tui --workspace --exclude kubeui-gtk
      - name: Clippy (tui feature)
        run: cargo clippy --features tui --workspace --exclude kubeui-gtk -- -D warnings

  gtk:
    name: gtk (build, test, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install GTK4 system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libpango1.0-dev libcairo2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build (gtk feature)
        run: cargo build --features gtk --workspace --exclude kubeui
      - name: Test (gtk feature)
        run: cargo test --features gtk --workspace --exclude kubeui
      - name: Clippy (gtk feature)
        run: cargo clippy --features gtk --workspace --exclude kubeui -- -D warnings
